version: '4.8'

services:
  web:
    build: .
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: db
      MYSQL_USER: root
      MYSQL_PASSWORD: example
      MYSQL_DATABASE: testdb
    depends_on:
      - db

  db:
    image: mysql:10
    environment:
      MYSQL_ROOT_PASSWORD: example
      MYSQL_DATABASE: testdb
    ports:
      - "5506:5506"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
